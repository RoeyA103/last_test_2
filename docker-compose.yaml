services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: digital_hunter
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/dump.sql:/docker-entrypoint-initdb.d/dump.sql

  api:
    build: ./app
    environment:
      - HOST=mysql
      - USER=root
      - PASSWORD=root
      - DATABASE=digital_hunter
    ports:
      - "8080:8080"
    depends_on:
      - mysql
volumes:
  mysql_data:



